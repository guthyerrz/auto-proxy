name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Publish to Maven Central
        run: ./gradlew :lib:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.version.outputs.name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Build release AAR
        run: ./gradlew :lib:assembleRelease

      - name: Build patcher shadow JAR
        run: ./gradlew :patcher:shadowJar

      - name: Generate checksum
        run: cd patcher/build/libs && sha256sum auto-proxy-patcher.jar > auto-proxy-patcher.jar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android/lib/build/outputs/aar/lib-release.aar
            android/patcher/build/libs/auto-proxy-patcher.jar
            android/patcher/build/libs/auto-proxy-patcher.jar.sha256

  ios-release:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: |
          brew install just xcodegen cocoapods
          gem install cocoapods

      - name: Build XCFramework
        run: just build-xcframework

      - name: Zip XCFramework and generate checksum
        run: |
          cd .build/xcframework
          zip -r -y AutoProxy.xcframework.zip AutoProxy.xcframework
          shasum -a 256 AutoProxy.xcframework.zip > AutoProxy.xcframework.zip.sha256

      - name: Build iOS patcher (universal binary)
        run: |
          just build-patcher-universal
          cd .build
          shasum -a 256 auto-proxy-ios-patcher > auto-proxy-ios-patcher.sha256

      # --- Publish ---

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ios/.build/xcframework/AutoProxy.xcframework.zip
            ios/.build/xcframework/AutoProxy.xcframework.zip.sha256
            ios/.build/auto-proxy-ios-patcher
            ios/.build/auto-proxy-ios-patcher.sha256

      - name: Update podspec version
        run: sed -i '' "s/s.version.*=.*/s.version      = '${{ steps.version.outputs.name }}'/" AutoProxy.podspec

      - name: Publish to CocoaPods trunk
        run: pod trunk push AutoProxy.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
